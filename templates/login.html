<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sufi Tech</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#6366f1,#9333ea,#0ea5e9);
}
.container{ perspective:1200px; }

.card{
    width:350px;
    height:420px;
    position:relative;
    transform-style:preserve-3d;
    transition: transform 0.8s;
}
.card.flip{ transform: rotateY(180deg); }

.side{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(18px);
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    padding:35px;
    color:white;
    text-align:center;
}
.back{ transform: rotateY(180deg); }

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:30px;
    background:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}
button:hover{ transform:scale(1.05); }

.switch{
    margin-top:15px;
    font-size:14px;
    cursor:pointer;
    color:#ddd;
}
.switch span{ color:white; font-weight:600; }

.msg{ margin-top:10px; color:#ffdede; }
</style>
</head>
<body>

<div class="container">
<div class="card" id="card">

    <!-- LOGIN SIDE -->
    <div class="side front">
        <h1>Sufi Tech</h1>
        <p>Employee Portal</p>

        <h3>Login</h3>

        <!-- ✅ FORM FIXED -->
        <form action="/submit" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <!-- error message from Flask -->
        <div class="msg">{{ message }}</div>

        <div class="switch" onclick="flipCard()">
            New here? <span>Sign Up</span>
        </div>
    </div>

    <!-- SIGNUP SIDE -->
    <div class="side back">
        <h1>Sufi Tech</h1>
        <p>Create your account</p>

        <h3>Sign Up</h3>

        <form action="/register" method="POST">
            <input type="text" name="fullname" placeholder="Full Name">
            <input type="email" name="email" placeholder="Email">
            <input type="password" name="password" placeholder="Password">
            <button type="submit">Register</button>
        </form>

        <div class="switch" onclick="flipCard()">
            Already have account? <span>Login</span>
        </div>
    </div>

</div>
</div>

<script>
function flipCard(){
    document.getElementById("card").classList.toggle("flip");
}
</script>

</body>
</html>
